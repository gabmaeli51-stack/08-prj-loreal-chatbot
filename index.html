<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Oréal // Neo-Advisor</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Orbitron:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="cyber-ticker">L'ORÉAL PARIS / AI PRODUCT LAB / FUTURE OF BEAUTY / CODESPACE V1.0</div>

    <div class="page-wrapper">
      <header class="brand-header">
        <img src="img/loreal-logo.png" alt="L'Oréal Paris" class="brand-logo" style="max-height: 45px; width: auto; display: block; margin: 0 auto 15px auto;">
        <h1 class="brand-title">Core AI Core / Beauty Interface</h1>
      </header>

      <main>
        <section class="chatbox">
          <div id="latestQuestionBox" class="latest-question-box"></div>
          
          <div id="chatWindow" class="chat-window"></div>

          <form id="chatForm" class="chat-form">
            <label for="userInput" class="visually-hidden">Message</label>
            <input
              id="userInput"
              name="userInput"
              type="text"
              placeholder="// ENTER QUERY: SYSTEM ROUTINES OR PRODUCTS..."
              autocomplete="off"
              required
            />
            <button type="submit" id="sendBtn">
              <span class="material-icons">send</span>
              <span class="visually-hidden">Send</span>
            </button>
          </form>
        </section>
      </main>

      <footer class="site-footer">
        <p>&copy; 2026 L'ORÉAL LABS. ALL RIGHTS RESERVED.</p>
        <nav>
          <a href="#">PRIVACY_POLICY</a>
          <a href="#">TERMS_OF_USE</a>
          <a href="#">CONTACT_NODE</a>
        </nav>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
